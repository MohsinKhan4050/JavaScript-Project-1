<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="clock">
        <h1>DIGITAL CLOCK</h1>
        <div class="clock-data">

            <div>
                <h4 class="hours"></h4>
                <p>HOURS</p>
            </div>

            <div>
                <h4 class="minutes"></h4>
                <p>MINUTES</p>
            </div>

            <div>
                <h4 class="second"></h4>
                <p>SECOND</p>
            </div>

            <div class="amPm">
                <span class="am-pm"></span>
            </div>

        </div>

    </section>





    <script src="script.js"></script>

</body>

</html>
